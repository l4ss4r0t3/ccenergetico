<!DOCTYPE html>

<html>
<head>

  <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <link rel="stylesheet" href="style.css">

  <title>Calculadora de Consumo Energético</title>

</head>
<body>
  
  <div class="conteudo">

  <h1>
    Calculadora de Consumo Energético
  </h1>

<h2>Calculadora de Custo (Consumo X Preço)</h2>
  
<form>

  <label for="consumo">Insira o Consumo do seu Eletro Doméstico aqui:</label><br>
  <input type="number" id="consumo" placeholder="kWh"><br>

  <label for="preco">Preço do kWh na sua Distribuidora:</label><br>
  <input type="number" id="preco" placeholder="R$"><br>

<p id="rCusto"></p>

<button type="button" id="cBtn2">Calcular</button>

</form>

</div>

<script src="script.js"></script>
  
</body>
</html>
